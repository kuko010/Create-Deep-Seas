name: Release

# Déclencheur manuel uniquement — tu choisis le type de release dans l'UI GitHub
# Onglet "Actions" → "Release" → "Run workflow"
on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Type de release (alpha / beta / release)'
        required: true
        default: 'alpha'
        type: choice
        options:
          - alpha
          - beta
          - release

permissions:
  contents: write # nécessaire pour créer la GitHub Release

jobs:
  release:
    name: Build & Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Read mod version
        id: version
        run: |
          VERSION=$(grep "^mod_version=" gradle.properties | cut -d'=' -f2 | tr -d '[:space:]')
          echo "mod_version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Build
        run: ./gradlew clean build

      - name: Publish to Modrinth
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: ./gradlew modrinth

      - name: Publish to CurseForge
        env:
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
        run: ./gradlew publishNeoForgePublicationToCurseForge

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.mod_version }}
          name: Create Deep Seas v${{ steps.version.outputs.mod_version }}
          body_path: changelog.md
          files: build/libs/*.jar
          draft: false
          prerelease: ${{ inputs.version_type != 'release' }}
