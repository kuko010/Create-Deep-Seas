modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="Maxenonyme"
logoFile="logo.png"
logoBlur=false
description='''
A submarine addon for the Create mod.
'''

[[mixins]]
config="create_submarine.mixins.json"

[[dependencies.${mod_id}]]
    modId="lithostitched"
    type="required"
    versionRange="[1.4.8,)"
    ordering="AFTER"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="${neo_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="create"
    type="required"
    versionRange="[0.5,)"
    ordering="AFTER"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="ponder"
    type="required"
    versionRange="[1.0,)"
    ordering="AFTER"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="sable"
    type="required"
    versionRange="${sable_version_range}"
    ordering="AFTER"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="sodium"
    type="incompatible"
    versionRange="[mc1.21.1-0.6.13-neoforge]"
    ordering="NONE"
    side="CLIENT"
